<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1f7a6b">
<title>词 · Chinese vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f4ee; --card:#ffffff; --ink:#1c2b29; --muted:#6b7a76;
  --jade:#1f7a6b; --jade-d:#155e52; --jade-soft:#e3efeb;
  --coral:#d9594c; --amber:#d99a3a; --grass:#3f9d6e;
  --line:#e6e3da; --shadow:0 6px 22px rgba(28,43,41,.10);
  --shadow-lg:0 14px 40px rgba(28,43,41,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:"Outfit","Noto Sans Thai",system-ui,sans-serif;overscroll-behavior:none}
.cn{font-family:"Noto Sans SC",system-ui,sans-serif}
.jp{font-family:"Noto Sans JP","Noto Sans SC",system-ui,sans-serif}
.th{font-family:"Noto Sans Thai","Outfit",sans-serif}
.app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative;padding-bottom:78px}
header{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.3px}
.brand .seal{width:34px;height:34px;border-radius:9px;background:var(--jade);color:#fff;display:grid;place-items:center;font-size:20px;font-weight:900}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.profbtn{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 13px;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:0 0 auto}
main{flex:1;padding:6px 20px 20px}
.hide{display:none!important}
h2.title{font-size:20px;margin:8px 0 2px;letter-spacing:-.4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:8px 14px;border-radius:999px;font-weight:600;font-size:13px;cursor:pointer}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

.langrow{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 12px;align-items:center}
.langrow .lr-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.langchip{border:1.5px solid var(--line);background:var(--card);color:var(--muted);padding:6px 11px;border-radius:999px;font-weight:600;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.langchip.on{background:var(--jade-soft);border-color:var(--jade);color:var(--jade-d)}
.ai{display:inline-block;background:var(--amber);color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:4px;margin-left:3px;vertical-align:middle;letter-spacing:.03em}

.navrow{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px}
.navbtn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--jade-d);font-size:24px;line-height:1;cursor:pointer;box-shadow:var(--shadow);display:grid;place-items:center}
.navbtn:active{transform:scale(.94)}
.pos{font-weight:700;font-size:16px}
.pos span{color:var(--muted);font-weight:500;font-size:14px}

.deck{position:relative;margin:2px 0 16px;touch-action:pan-y}
.swipe{position:relative;perspective:1400px;will-change:transform;cursor:grab}
.swipe.enter{animation:cardIn .32s ease}
@keyframes cardIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.flash{position:relative;width:100%;min-height:340px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.1,.2,1)}
.flash.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 24px}
.face.back{transform:rotateY(180deg)}
.eyebrow{position:absolute;top:16px;left:18px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.speak{position:absolute;top:12px;right:12px;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;font-size:19px}
.cornertag{position:absolute;top:16px;left:50%;transform:translateX(-50%);width:34px;height:6px;border-radius:4px;background:var(--line)}
.cornertag.t-hard{background:var(--coral)} .cornertag.t-medium{background:var(--amber)} .cornertag.t-easy{background:var(--grass)}
.cornertag.none{display:none}
.face .big-cn{font-size:62px;font-weight:700;line-height:1.1;letter-spacing:2px}
.face .py{font-size:21px;color:var(--jade-d);font-weight:600;margin:4px 0 10px}
.trow{display:flex;align-items:baseline;justify-content:center;gap:9px;margin:7px 0;flex-wrap:wrap}
.tlabel{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;min-width:40px;text-align:right}
.ttext{font-size:21px;font-weight:600;color:var(--ink);max-width:300px}
.divider{width:46px;height:3px;background:var(--jade-soft);border-radius:2px;margin:14px 0}
.ex{margin-top:2px;max-width:380px}
.ex .ex-cn{font-size:16px;font-weight:500;line-height:1.5}
.ex .ex-py{font-size:12.5px;color:var(--jade-d);margin-top:3px}
.ex .ex-th{font-size:13px;color:var(--muted);margin-top:3px}
.emptylang{color:var(--muted);font-size:14px}
.hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:var(--muted)}
.cue{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;color:var(--jade);opacity:0;transition:opacity .15s;pointer-events:none;z-index:2}
.cue.l{left:-2px}.cue.r{right:-2px}

.tagrow{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}
.taglabel{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:9px}
.taglabel small{font-weight:500;opacity:.8}
.tags{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.tagbtn{border:1.5px solid var(--line);background:var(--paper);border-radius:12px;padding:12px 4px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:7px}
.tagbtn::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--line)}
.tagbtn.t-hard::before{background:var(--coral)} .tagbtn.t-medium::before{background:var(--amber)} .tagbtn.t-easy::before{background:var(--grass)}
.tagbtn.on{color:#fff;border-color:transparent}
.tagbtn.t-hard.on{background:var(--coral)} .tagbtn.t-medium.on{background:var(--amber)} .tagbtn.t-easy.on{background:var(--grass)}
.tagbtn.on::before{background:#fff}
.clearhint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;min-height:14px}

.qdir{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:3px;font-size:13px;font-weight:600;margin:0 auto 16px}
.qdir button{border:0;background:transparent;color:var(--muted);padding:7px 14px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:600}
.qdir button.on{background:var(--jade);color:#fff}
.q-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow);margin-bottom:14px;min-height:138px;display:flex;flex-direction:column;justify-content:center}
.q-prompt{font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.q-main{font-size:30px;font-weight:700;line-height:1.35;margin-bottom:6px}
.q-main.sentence{font-size:21px;line-height:1.6}
.q-hint{color:var(--muted);font-size:14px}
.opts{display:flex;flex-direction:column;gap:10px;min-height:248px}
.opt{border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:15px 16px;font-family:inherit;font-size:18px;font-weight:600;text-align:left;cursor:pointer;transition:.15s;color:var(--ink)}
.opt:active{transform:scale(.99)}
.opt.correct{background:#e7f5ec;border-color:var(--grass);color:#1d6c45}
.opt.wrong{background:#fbe9e7;border-color:var(--coral);color:#a83a2f}
.opt.dim{opacity:.5}
.btn{display:block;width:100%;border:0;background:var(--jade);color:#fff;font-family:inherit;font-weight:700;font-size:16px;padding:15px;border-radius:14px;cursor:pointer;box-shadow:var(--shadow)}
.btn:disabled{opacity:.45}
.btn.ghost{background:var(--card);color:var(--jade-d);border:1.5px solid var(--jade)}
.search{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 16px;font-family:inherit;font-size:15px;margin-bottom:12px;color:var(--ink)}
.search:focus{outline:2px solid var(--jade-soft);border-color:var(--jade)}
.row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line);flex:0 0 auto}
.dot.t-hard{background:var(--coral)} .dot.t-medium{background:var(--amber)} .dot.t-easy{background:var(--grass)}
.row .rc{font-size:24px;font-weight:700;min-width:66px}
.row .rt{flex:1;min-width:0}
.row .rt .rp{font-size:13px;color:var(--jade-d);font-weight:600}
.row .rt .rm{font-size:14px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .tag{font-size:11px;color:var(--muted);background:var(--paper);padding:3px 8px;border-radius:7px;font-weight:600}

.me-hero{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow);text-align:center;margin-bottom:14px}
.me-mascot{width:152px;height:152px}
.me-stage{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-top:2px}
.me-level{color:var(--muted);font-size:13px;font-weight:600;margin-top:2px}
.bar{height:10px;background:var(--line);border-radius:6px;overflow:hidden;margin:12px auto 6px;max-width:280px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--jade),var(--grass));transition:width .4s}
.me-next{color:var(--muted);font-size:12.5px}
.me-streak{margin-top:12px;display:inline-block;background:var(--jade-soft);color:var(--jade-d);font-weight:700;font-size:13px;padding:6px 13px;border-radius:999px}
.evolve{background:linear-gradient(90deg,#fff3dc,#ffe9c2);border:1px solid var(--amber);color:#8a5a12;font-weight:700;text-align:center;padding:11px;border-radius:14px;margin-bottom:14px;animation:fade .4s ease}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.stat .n{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{color:var(--muted);font-size:13px;font-weight:500;margin-top:6px}
.stat .n.jade{color:var(--jade)} .stat .n.coral{color:var(--coral)} .stat .n.grass{color:var(--grass)}
.tagbar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:12px 0 8px;border:1px solid var(--line)}
.tagbar i{display:block;height:100%}
.tagbar .s-hard{background:var(--coral)} .tagbar .s-medium{background:var(--amber)} .tagbar .s-easy{background:var(--grass)} .tagbar .s-none{background:#eceae2}
.tagbar-key{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.tagbar-key span{display:flex;align-items:center;gap:5px}
.tagbar-key i{width:9px;height:9px;border-radius:50%;display:inline-block}
.mascot-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mp{border:2px solid var(--line);background:var(--card);border-radius:16px;padding:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;font-family:inherit;font-weight:700;font-size:11px;color:var(--muted);text-transform:capitalize}
.mp svg{width:62px;height:62px}
.mp.on{border-color:var(--jade);background:var(--jade-soft);color:var(--jade-d)}
.prof-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.prof-chip{border:1.5px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
.prof-chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.reset{margin-top:14px;text-align:center}
.reset button{background:none;border:0;color:var(--muted);font-family:inherit;font-size:13px;text-decoration:underline;cursor:pointer}
.center-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:36px 24px;text-align:center;box-shadow:var(--shadow);margin-top:10px;display:flex;flex-direction:column;align-items:center}
.center-card .emoji{font-size:46px}
.center-card h3{margin:14px 0 6px;font-size:22px}
.center-card p{color:var(--muted);margin:0 0 18px;font-size:15px}

#onboarding{position:fixed;inset:0;background:rgba(28,43,41,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
#onboarding.hide{display:none}
.ob-card{background:var(--paper);border-radius:24px;padding:24px;max-width:430px;width:100%;box-shadow:var(--shadow-lg);max-height:94vh;overflow:auto}
.ob-title{font-size:24px;font-weight:800;text-align:center}
.ob-sub{color:var(--muted);text-align:center;font-size:14px;margin:4px 0 14px}
.ob-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;text-align:center}

nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
nav button{flex:1;border:0;background:transparent;font-family:inherit;cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:4px}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--jade)}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.flash,.swipe,.swipe.enter{transition:none;animation:none}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="seal cn">词</span><div>Lesson Deck<small>华语 · Batch 01</small></div></div>
    <button class="profbtn" id="profBtn"><span id="profName"></span> ▾</button>
  </header>
  <main>
    <section id="view-study">
      <div class="chips" id="lessonChips"></div>
      <div class="langrow" id="langRow"></div>
      <div id="studyArea"></div>
    </section>
    <section id="view-quiz" class="hide">
      <h2 class="title">Quiz</h2>
      <p class="sub" id="quizSub">Test recall against the lesson set.</p>
      <div id="quizArea"></div>
    </section>
    <section id="view-browse" class="hide">
      <h2 class="title">All words</h2>
      <p class="sub" id="browseSub"></p>
      <input class="search" id="search" placeholder="Search 汉字, pinyin, or ไทย…">
      <div id="browseList"></div>
    </section>
    <section id="view-me" class="hide">
      <h2 class="title">Your growth</h2>
      <p class="sub">Saved on this device.</p>
      <div id="meArea"></div>
    </section>
  </main>
  <nav id="nav">
    <button data-view="study" class="on"><svg viewBox="0 0 24 24"><path d="M4 5h10a2 2 0 012 2v12a1 1 0 01-1.5.9L9 17l-5.5 2.9A1 1 0 012 19V7a2 2 0 012-2z"/></svg>Study</button>
    <button data-view="quiz"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 115 .5c0 1.5-2.5 2-2.5 3.5"/><path d="M12 17h.01"/></svg>Quiz</button>
    <button data-view="browse"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Browse</button>
    <button data-view="me"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/></svg>Me</button>
  </nav>
</div>
<div id="onboarding" class="hide"></div>

const Store = (()=>{
  const mem={}; const hasWS = typeof window!=='undefined' && window.storage && window.storage.get;
  return {
    async get(k){ if(hasWS){ try{const r=await window.storage.get(k); return r? JSON.parse(r.value):null;}catch(e){return null;} }
      try{const v=localStorage.getItem(k); return v?JSON.parse(v):null;}catch(e){ return k in mem? mem[k]:null; } },
    async set(k,v){ const s=JSON.stringify(v); if(hasWS){ try{await window.storage.set(k,s); return;}catch(e){} }
      try{localStorage.setItem(k,s);}catch(e){ mem[k]=v; } }
  };
})();

      s+=`<circle cx="50" cy="120" r="20" fill="${C.spike}"/><circle cx="50" cy="120" r="8" fill="${C.accent}"/>`;
    }
  }
  const scale = stage===1?0.6: stage===2?0.82:1;
  s+=`<g transform="translate(100 108) scale(${scale}) translate(-100 -108)">`;
  s+=`<ellipse cx="100" cy="116" rx="44" ry="43" fill="${C.body}"/>`;
  s+=`<ellipse cx="100" cy="127" rx="25" ry="23" fill="${C.belly}"/>`;

  if(type==='phoenix' && stage>=2){ s+=`<path d="M100 80 q-9 -18 0 -28 q9 10 0 28 Z" fill="${C.accent}"/>`;
    if(stage>=4) s+=`<path d="M86 78 q-7 -14 1 -22 M114 78 q7 -14 -1 -22" stroke="${C.accent}" stroke-width="4" fill="none" stroke-linecap="round"/>`; }
  if(type==='warrior' && stage>=2){ s+=`<path d="M68 98 A32 30 0 0 1 132 98 L132 102 L68 102 Z" fill="${C.spike}"/><rect x="96" y="86" width="8" height="16" fill="${C.body}"/>`;
    if(stage>=4) s+=`<rect x="92" y="54" width="16" height="10" rx="2" fill="${C.accent}"/>`; }
  if(type==='dragon' && stage>=4) s+=`<path d="M100 74 l-7 -14 l7 5 l7 -5 z" fill="${C.accent}"/>`;

  s+=`<circle cx="88.5" cy="107.5" r="2.4" fill="#fff"/><circle cx="116.5" cy="107.5" r="2.4" fill="#fff"/>`;
  s+=`<circle cx="76" cy="122" r="5" fill="${C.accent}" opacity="0.45"/><circle cx="124" cy="122" r="5" fill="${C.accent}" opacity="0.45"/>`;
  if(type==='phoenix') s+=`<path d="M95 120 L100 128 L105 120 Z" fill="${C.accent}"/>`;
  else s+=`<path d="M91 124 Q100 133 109 124" fill="none" stroke="#23302d" stroke-width="2.5" stroke-linecap="round"/>`;
  s+=`<ellipse cx="85" cy="158" rx="11" ry="7" fill="${C.spike}"/><ellipse cx="115" cy="158" rx="11" ry="7" fill="${C.spike}"/>`;
  s+=`</g>`;
  if(stage===1) s+=`<path d="M62 150 Q100 140 138 150 L150 168 L134 160 L122 170 L108 160 L94 170 L80 160 L66 168 Z" fill="#f3ede1" stroke="${C.spike}" stroke-width="2" stroke-linejoin="round"/>`;
  return s;
}

function saveProg(){ saveData(); } function saveMeta(){ saveData(); } function saveSet(){ saveData(); }
function rec(cn){ return PROG[cn]||(PROG[cn]={seen:false,tag:null}); }

const LMAP={}; DATA.lessons.forEach((l,i)=>LMAP[l]=i+1);

let deckArr=[], idx=0, flipped=false;
function exHTML(v){ return v.ex_cn?`<div class="divider"></div><div class="ex">

function backHTML(v){

function renderLangRow(){

function rebuildDeck(){ deckArr=deck().slice(); idx=0; flipped=false; renderCard(); }
function curWord(){ return deckArr[idx]; }
function renderCard(animate=true){

function go(step){ idx=(idx+step+deckArr.length)%deckArr.length; flipped=false; renderCard(); }
function wireCard(){
  const swipe=document.getElementById('swipe'), flash=document.getElementById('flash');
  const cueL=document.getElementById('cueL'), cueR=document.getElementById('cueR');
  let sx=0,sy=0,dx=0,dy=0,active=false,moved=false;
  const reset=()=>{ swipe.style.transform=''; swipe.style.opacity='1'; cueL.style.opacity=0; cueR.style.opacity=0; };
  swipe.addEventListener('pointerdown',e=>{ active=true;moved=false;sx=e.clientX;sy=e.clientY;dx=dy=0;
    swipe.style.transition='none'; swipe.classList.remove('enter'); try{swipe.setPointerCapture(e.pointerId);}catch(_){} });
  swipe.addEventListener('pointermove',e=>{ if(!active)return; dx=e.clientX-sx; dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>8)moved=true;
    swipe.style.transform=`translateX(${dx}px) rotate(${dx*0.03}deg)`;
    swipe.style.opacity=String(1-Math.min(Math.abs(dx)/700,.35));
    cueR.style.opacity = dx>40?Math.min(dx/120,1):0; cueL.style.opacity = dx<-40?Math.min(-dx/120,1):0; });
  const end=()=>{ if(!active)return; active=false; swipe.style.transition='transform .28s ease, opacity .28s ease';
    if(!moved){ flipped=!flipped; flash.classList.toggle('flip'); reset(); return; }
    const TH=70;
    if(dx<-TH){ swipe.style.transform=`translateX(${-innerWidth}px) rotate(-12deg)`; swipe.style.opacity='0'; setTimeout(()=>go(1),180); }
    else if(dx>TH){ swipe.style.transform=`translateX(${innerWidth}px) rotate(12deg)`; swipe.style.opacity='0'; setTimeout(()=>go(-1),180); }
    else reset(); };
  swipe.addEventListener('pointerup',end); swipe.addEventListener('pointercancel',end);
  document.getElementById('prevBtn').onclick=()=>go(-1);
  document.getElementById('nextBtn').onclick=()=>go(1);
  const s1=document.getElementById('spk1'), s2=document.getElementById('spk2');
  if(s1)s1.onclick=e=>{e.stopPropagation();speak(curWord().cn);};
  if(s2)s2.onclick=e=>{e.stopPropagation();speak(curWord().cn);};
  document.querySelectorAll('.tagbtn').forEach(b=>b.onclick=()=>{
    const c=rec(curWord().cn), t=b.dataset.tag; c.tag = c.tag===t ? null : t; saveProg();
    document.querySelectorAll('.tagbtn').forEach(x=>x.classList.toggle('on', x.dataset.tag===c.tag));
    document.querySelectorAll('.cornertag').forEach(el=>el.className='cornertag '+(c.tag?('t-'+c.tag):'none'));
    document.getElementById('clearHint').textContent = c.tag?'Tap the active tag again to clear':''; });
}
document.addEventListener('keydown',e=>{ if(view!=='study')return;
  if(e.key==='ArrowRight')go(1); else if(e.key==='ArrowLeft')go(-1);
  else if(e.key===' '){e.preventDefault(); const f=document.getElementById('flash'); if(f){flipped=!flipped;f.classList.toggle('flip');}} });

/* ---------- QUIZ ---------- */
let quiz=[], qi=0, qScore=0, answered=false;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQuiz(){
  const d=deck(); let items=[];
  (lesson==='all'?DATA.quizzes:DATA.quizzes.filter(q=>q.lesson===lesson)).forEach(q=>items.push({type:'fib',q}));
  shuffle(d).slice(0,Math.max(0,10-items.length)).forEach(v=>{
    const opts=shuffle([v,...shuffle(d.filter(x=>x.cn!==v.cn)).slice(0,3)]);
    items.push({type:'mc',v,opts,answer:opts.indexOf(v)}); });
  quiz=shuffle(items).slice(0,10); qi=0; qScore=0;
}
function setDir(nd){ dir=nd; saveSet(); renderQuiz(); }
function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(quiz.length===0){
    area.innerHTML=`<div class="center-card"><div class="emoji">📝</div><h3>Ready?</h3>
      <p>${(lesson==='all'?'All lessons':lessonLabel(lesson))} · up to 10 questions.</p>
      <div class="qdir"><button class="${dir==='cn2th'?'on':''}" onclick="setDir('cn2th')">中→ไทย</button>
        <button class="${dir==='th2cn'?'on':''}" onclick="setDir('th2cn')">ไทย→中</button></div>
      <button class="btn" onclick="startQuiz()">Start quiz</button></div>`; return; }
  if(qi>=quiz.length){ const pct=Math.round(qScore/quiz.length*100);
    area.innerHTML=`<div class="center-card fade"><div class="emoji">${pct>=80?'🏆':pct>=50?'👍':'📚'}</div>
      <h3>${qScore} / ${quiz.length}</h3><p>${pct}% correct</p>
      <button class="btn" onclick="startQuiz()">Try again</button>
      <button class="btn ghost" style="margin-top:10px" onclick="switchView('study')">Back to study</button></div>`; return; }
  const it=quiz[qi]; answered=false;
  document.getElementById('quizSub').textContent=`Question ${qi+1} of ${quiz.length} · score ${qScore}`;
  let body;
  if(it.type==='fib'){
    body=`<div class="q-card fade"><div class="q-prompt">เติมคำในช่องว่าง · Fill the blank</div>
      <div class="q-main sentence cn">${it.q.sentence_cn.replace(/＿+/,'<span style="color:var(--coral)">＿＿</span>')}</div>
      ${it.q.sentence_th?`<div class="q-hint th">${it.q.sentence_th}</div>`:''}</div>
      <div class="opts" id="opts">${it.q.options.map((o,i)=>`<button class="opt cn" onclick="ansQuiz(${i},${it.q.answer})">${o}</button>`).join('')}</div>`;
  } else { const askCN=dir==='cn2th';
    body=`<div class="q-card fade"><div class="q-prompt">${askCN?'เลือกความหมาย · Choose meaning':'เลือกคำจีน · Choose the word'}</div>
      <div class="q-main ${askCN?'cn':'th'}">${askCN?it.v.cn:it.v.th}</div><div class="q-hint">${askCN?it.v.py:''}</div></div>
      <div class="opts" id="opts">${it.opts.map((o,i)=>`<button class="opt ${askCN?'th':'cn'}" onclick="ansQuiz(${i},${it.answer})">${askCN?o.th:o.cn}</button>`).join('')}</div>`;
  }
  area.innerHTML=body+`<button class="btn ghost" style="margin-top:12px" onclick="skipQ()">Skip — do this one later</button>`;
}
function ansQuiz(picked,correct){
  if(answered)return; answered=true;
  [...document.querySelectorAll('#opts .opt')].forEach((b,i)=>{ b.style.pointerEvents='none';
    if(i===correct)b.classList.add('correct'); else if(i===picked)b.classList.add('wrong'); else b.classList.add('dim'); });
  const ok=picked===correct; if(ok)qScore++; META.quizTotal++; if(ok)META.quizCorrect++;
  awardXP(ok?5:1);
  const it=quiz[qi]; if(it.type==='mc')speak(it.v.cn);
  setTimeout(()=>{ qi++; renderQuiz(); }, ok?700:1300);
}
function skipQ(){ if(answered||quiz.length<2)return; const [it]=quiz.splice(qi,1); quiz.push(it); renderQuiz(); }
function startQuiz(){ buildQuiz(); renderQuiz(); }

  document.getElementById('newProf').onclick=()=>showOnboarding(true);
  document.getElementById('resetBtn').onclick=async()=>{ if(confirm('Reset progress for this profile?')){
    PROG={};META={quizCorrect:0,quizTotal:0};GAME.xp=0;GAME.streak=0;GAME.lastDay=null;GAME.stageSeen=0;saveData();dailyCheck();renderMe();rebuildDeck();}};
}

/* ---------- onboarding / profiles ---------- */
let obMascot='dragon';
function showOnboarding(canCancel){
  const o=document.getElementById('onboarding'); o.classList.remove('hide'); obMascot='dragon';
  o.innerHTML=`<div class="ob-card">
    <div class="ob-title">${PROFILES.length?'New learner':'Welcome! 词'}</div>
    <p class="ob-sub">Create a profile to track your own growth.</p>
    <input class="search" id="obName" placeholder="Your name or nickname" maxlength="20" style="text-align:center;margin-bottom:0">
    <div class="ob-label">Choose your companion</div>
    <div class="mascot-pick" id="obMascots">
      ${['dragon','phoenix','warrior'].map(t=>`<button class="mp ${t==='dragon'?'on':''}" data-t="${t}"><svg viewBox="0 0 200 200">${mascot(t,4)}</svg><span>${t}</span></button>`).join('')}
    </div>
    <button class="btn" id="obStart" style="margin-top:18px">Start learning</button>
    ${canCancel?`<button class="btn ghost" id="obCancel" style="margin-top:10px">Cancel</button>`:''}
  </div>`;
  o.querySelectorAll('#obMascots .mp').forEach(b=>b.onclick=()=>{ obMascot=b.dataset.t;
    o.querySelectorAll('#obMascots .mp').forEach(x=>x.classList.toggle('on',x===b)); });
  document.getElementById('obStart').onclick=async()=>{
    const n=(document.getElementById('obName').value||'').trim()||'Learner'; await createProfile(n,obMascot); };
  if(canCancel)document.getElementById('obCancel').onclick=()=>o.classList.add('hide');
}
async function createProfile(name,m){
  const id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  PROFILES.push({id,name,mascot:m}); CUR=id; await saveProfiles();
  PROG={};META={quizCorrect:0,quizTotal:0};dir='cn2th';langs={py:true,th:true,en:false,jp:false};
  GAME={mascot:m,xp:0,streak:0,lastDay:null,stageSeen:0}; saveData(); dailyCheck();
  document.getElementById('onboarding').classList.add('hide'); startApp(); switchView('study');
}
async function switchProfile(id){ CUR=id; await Store.set(CKEY,CUR); await loadCurrent(); dailyCheck(); startApp(); switchView('me'); }
function updateHeader(){ const p=PROFILES.find(p=>p.id===CUR); document.getElementById('profName').textContent=p?p.name:''; }

/* ---------- nav ---------- */
function switchView(v){ view=v;
  ['study','quiz','browse','me'].forEach(x=>document.getElementById('view-'+x).classList.toggle('hide',x!==v));
  [...document.querySelectorAll('#nav button')].forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  if(v==='study'){ if(deckArr.length===0)rebuildDeck(); else renderCard(); }
  if(v==='quiz')renderQuiz(); if(v==='browse')renderBrowse(document.getElementById('search').value); if(v==='me')renderMe();
}
function renderChips(){
  const c=document.getElementById('lessonChips');
  c.innerHTML=['all',...DATA.lessons].map(l=>`<button class="chip ${l===lesson?'on':''}" data-l="${l}">${l==='all'?'All':lessonLabel(l)}</button>`).join('');
  [...c.children].forEach(b=>b.onclick=()=>{ lesson=b.dataset.l; renderChips(); rebuildDeck(); quiz=[]; });
}
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)switchView(b.dataset.view);});
document.getElementById('profBtn').onclick=()=>switchView('me');
document.getElementById('search').addEventListener('input',e=>renderBrowse(e.target.value));

function startApp(){ updateHeader(); renderChips(); renderLangRow(); rebuildDeck(); }
(async()=>{
  await loadProfiles();
  if(!CUR || !PROFILES.find(p=>p.id===CUR)){ showOnboarding(false); }
  else { await loadCurrent(); dailyCheck(); startApp(); }
})();
</script>
</body>
</html>
