<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1f7a6b">
<title>词 · Chinese ⇄ ไทย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+Thai:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f4ee; --card:#ffffff; --ink:#1c2b29; --muted:#6b7a76;
  --jade:#1f7a6b; --jade-d:#155e52; --jade-soft:#e3efeb;
  --coral:#d9594c; --amber:#d99a3a; --grass:#3f9d6e;
  --line:#e6e3da; --shadow:0 6px 22px rgba(28,43,41,.10);
  --shadow-lg:0 14px 40px rgba(28,43,41,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Outfit","Noto Sans Thai",system-ui,sans-serif;
  overscroll-behavior:none;
}
.cn{font-family:"Noto Sans SC",system-ui,sans-serif}
.th{font-family:"Noto Sans Thai","Outfit",sans-serif}
.app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative;padding-bottom:78px}
/* header */
header{padding:18px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.3px}
.brand .seal{width:34px;height:34px;border-radius:9px;background:var(--jade);color:#fff;display:grid;place-items:center;font-size:20px;font-weight:900}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.dir-toggle{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;font-size:12px;font-weight:600;box-shadow:var(--shadow)}
.dir-toggle button{border:0;background:transparent;color:var(--muted);padding:6px 11px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:600}
.dir-toggle button.on{background:var(--jade);color:#fff}
/* views */
main{flex:1;padding:6px 20px 20px}
.hide{display:none!important}
h2.title{font-size:20px;margin:8px 0 2px;letter-spacing:-.4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
/* lesson chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:8px 14px;border-radius:999px;font-weight:600;font-size:13px;cursor:pointer}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* flashcard */
.stage{perspective:1400px;margin:8px 0 14px}
.flash{position:relative;width:100%;min-height:340px;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.1,.2,1);cursor:pointer}
.flash.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px}
.face.back{transform:rotateY(180deg)}
.eyebrow{position:absolute;top:16px;left:18px;font-size:11px;font-weight:600;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase}
.speak{position:absolute;top:12px;right:12px;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);
  background:var(--paper);display:grid;place-items:center;cursor:pointer;font-size:19px}
.face .big-cn{font-size:62px;font-weight:700;line-height:1.1;letter-spacing:2px}
.face .big-th{font-size:30px;font-weight:700;line-height:1.3}
.face .py{font-size:22px;color:var(--jade-d);font-weight:600;margin-top:10px}
.face .en{color:var(--muted);font-size:15px;margin-top:4px;font-style:italic}
.divider{width:46px;height:3px;background:var(--jade-soft);border-radius:2px;margin:16px 0}
.ex{margin-top:4px;max-width:380px}
.ex .ex-cn{font-size:17px;font-weight:500;line-height:1.5}
.ex .ex-py{font-size:13px;color:var(--jade-d);margin-top:3px}
.ex .ex-th{font-size:14px;color:var(--muted);margin-top:3px}
.hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:var(--muted)}
/* grade buttons */
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grade{border:0;border-radius:14px;padding:12px 4px 10px;font-family:inherit;cursor:pointer;color:#fff;font-weight:700;font-size:14px;box-shadow:var(--shadow)}
.grade small{display:block;font-weight:500;font-size:10.5px;opacity:.9;margin-top:2px}
.g-again{background:var(--coral)} .g-hard{background:var(--amber)}
.g-good{background:var(--grass)} .g-easy{background:var(--jade)}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin:2px 0 12px;font-size:13px;color:var(--muted);font-weight:500}
.bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:14px}
.bar i{display:block;height:100%;background:var(--jade);transition:width .3s}
/* quiz */
.q-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow);margin-bottom:14px}
.q-prompt{font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.q-main{font-size:30px;font-weight:700;line-height:1.35;margin-bottom:6px}
.q-main.sentence{font-size:21px;line-height:1.6}
.q-hint{color:var(--muted);font-size:14px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:15px 16px;
  font-family:inherit;font-size:18px;font-weight:600;text-align:left;cursor:pointer;transition:.15s;color:var(--ink)}
.opt:active{transform:scale(.99)}
.opt.correct{background:#e7f5ec;border-color:var(--grass);color:#1d6c45}
.opt.wrong{background:#fbe9e7;border-color:var(--coral);color:#a83a2f}
.opt.dim{opacity:.5}
.btn{display:block;width:100%;border:0;background:var(--jade);color:#fff;font-family:inherit;font-weight:700;
  font-size:16px;padding:15px;border-radius:14px;cursor:pointer;box-shadow:var(--shadow)}
.btn.ghost{background:var(--card);color:var(--jade-d);border:1.5px solid var(--jade)}
.btn:disabled{opacity:.4}
/* browse */
.search{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 16px;
  font-family:inherit;font-size:15px;margin-bottom:12px;color:var(--ink)}
.search:focus{outline:2px solid var(--jade-soft);border-color:var(--jade)}
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
.row .rc{font-size:24px;font-weight:700;min-width:74px}
.row .rt{flex:1;min-width:0}
.row .rt .rp{font-size:13px;color:var(--jade-d);font-weight:600}
.row .rt .rm{font-size:14px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .tag{font-size:11px;color:var(--muted);background:var(--paper);padding:3px 8px;border-radius:7px;font-weight:600}
/* stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.stat .n{font-size:34px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{color:var(--muted);font-size:13px;font-weight:500;margin-top:6px}
.stat .n.jade{color:var(--jade)} .stat .n.coral{color:var(--coral)} .stat .n.grass{color:var(--grass)}
.reset{margin-top:8px;text-align:center}
.reset button{background:none;border:0;color:var(--muted);font-family:inherit;font-size:13px;text-decoration:underline;cursor:pointer}
/* empty / done */
.center-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:40px 24px;text-align:center;box-shadow:var(--shadow);margin-top:10px}
.center-card .emoji{font-size:46px}
.center-card h3{margin:14px 0 6px;font-size:22px}
.center-card p{color:var(--muted);margin:0 0 18px;font-size:15px}
/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
nav button{flex:1;border:0;background:transparent;font-family:inherit;cursor:pointer;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:4px}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--jade)}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.flash{transition:none}.fade{animation:none}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="seal cn">词</span>
      <div>Lesson Deck<small>华语 · Batch 01</small></div>
    </div>
    <div class="dir-toggle" id="dirToggle">
      <button data-dir="cn2th" class="on">中→ไทย</button>
      <button data-dir="th2cn">ไทย→中</button>
    </div>
  </header>

  <main>
    <!-- STUDY -->
    <section id="view-study">
      <div class="chips" id="lessonChips"></div>
      <div class="progress-row"><span id="studyCount">—</span><span id="studyDir"></span></div>
      <div class="bar"><i id="studyBar" style="width:0%"></i></div>
      <div id="studyArea"></div>
    </section>

    <!-- QUIZ -->
    <section id="view-quiz" class="hide">
      <h2 class="title">Quiz</h2>
      <p class="sub" id="quizSub">Test recall against the lesson set.</p>
      <div id="quizArea"></div>
    </section>

    <!-- BROWSE -->
    <section id="view-browse" class="hide">
      <h2 class="title">All words</h2>
      <p class="sub" id="browseSub"></p>
      <input class="search" id="search" placeholder="Search 汉字, pinyin, or ไทย…">
      <div id="browseList"></div>
    </section>

    <!-- STATS -->
    <section id="view-stats" class="hide">
      <h2 class="title">Progress</h2>
      <p class="sub">Saved on this device.</p>
      <div class="stat-grid" id="statGrid"></div>
      <div class="reset"><button id="resetBtn">Reset all progress</button></div>
    </section>
  </main>

  <nav id="nav">
    <button data-view="study" class="on"><svg viewBox="0 0 24 24"><path d="M4 5h10a2 2 0 012 2v12a1 1 0 01-1.5.9L9 17l-5.5 2.9A1 1 0 012 19V7a2 2 0 012-2z"/></svg>Study</button>
    <button data-view="quiz"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 115 .5c0 1.5-2.5 2-2.5 3.5"/><path d="M12 17h.01"/></svg>Quiz</button>
    <button data-view="browse"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Browse</button>
    <button data-view="stats"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-5M13 16V9M18 16v-8"/></svg>Stats</button>
  </nav>
</div>

/* ---------- storage: window.storage → localStorage → memory ---------- */
const Store = (()=>{
  const mem={};
  const hasWS = typeof window!=='undefined' && window.storage && window.storage.get;
  return {
    async get(k){
      if(hasWS){ try{const r=await window.storage.get(k); return r? JSON.parse(r.value):null;}catch(e){return null;} }
      try{const v=localStorage.getItem(k); return v?JSON.parse(v):null;}catch(e){ return k in mem? mem[k]:null; }
    },
    async set(k,v){
      const s=JSON.stringify(v);
      if(hasWS){ try{await window.storage.set(k,s); return;}catch(e){} }
      try{localStorage.setItem(k,s);}catch(e){ mem[k]=v; }
    }
  };
})();

/* ---------- state ---------- */
let PROG={};        // per-word SRS keyed by cn
let META={quizCorrect:0,quizTotal:0};
let dir='cn2th';
let lesson='all';
let view='study';

const KEY='lessondeck_prog_v1', MKEY='lessondeck_meta_v1';
async function load(){ PROG=await Store.get(KEY)||{}; META=await Store.get(MKEY)||{quizCorrect:0,quizTotal:0}; }
async function saveProg(){ await Store.set(KEY,PROG); }
async function saveMeta(){ await Store.set(MKEY,META); }

const now=()=>Date.now();
const DAY=86400000;
function card(cn){ return PROG[cn]||(PROG[cn]={ease:2.5,interval:0,due:0,reps:0,lapses:0}); }
function deck(){ return lesson==='all'?DATA.vocab:DATA.vocab.filter(v=>v.lesson===lesson); }

/* ---------- SRS (simplified SM-2) ---------- */
function grade(cn,g){ // 0 again,1 hard,2 good,3 easy
  const c=card(cn);
  if(g===0){ c.ease=Math.max(1.3,c.ease-0.2); c.interval=0; c.lapses++; c.due=now()+60000; }
  else if(g===1){ c.ease=Math.max(1.3,c.ease-0.15); c.interval=Math.max(1,c.interval*1.2||1); c.due=now()+c.interval*DAY; }
  else if(g===2){ c.interval=c.reps===0?1:Math.max(1,c.interval*c.ease); c.due=now()+c.interval*DAY; }
  else { c.ease+=0.15; c.interval=Math.max(4,(c.interval||1)*c.ease*1.3); c.due=now()+c.interval*DAY; }
  c.reps++; saveProg();
}

/* ---------- audio ---------- */
let zhVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); zhVoice=vs.find(v=>/zh|Chinese/i.test(v.lang+v.name))||null; }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; if(zhVoice)u.voice=zhVoice; u.rate=.85;
  speechSynthesis.speak(u);
}

/* ---------- STUDY ---------- */
let queue=[], cur=null, flipped=false, sessionDone=0, sessionTotal=0;
function buildQueue(){
  const d=deck();
  const due=d.filter(v=>{const c=PROG[v.cn]; return c&&c.due<=now()&&c.reps>0;});
  const fresh=d.filter(v=>!PROG[v.cn]||PROG[v.cn].reps===0);
  // due first, then up to 12 new per session
  queue=[...due, ...fresh.slice(0,12)];
  // if nothing due/new (all ahead of schedule) let user review whole lesson
  if(queue.length===0) queue=[...d];
  sessionTotal=queue.length; sessionDone=0;
}
function nextCard(){ flipped=false; cur=queue.shift()||null; renderStudy(); }

function renderStudy(){
  const area=document.getElementById('studyArea');
  document.getElementById('studyDir').textContent = dir==='cn2th'?'中文 → ไทย':'ไทย → 中文';
  if(!cur){
    document.getElementById('studyCount').textContent='Session complete';
    document.getElementById('studyBar').style.width='100%';
    area.innerHTML=`<div class="center-card fade"><div class="emoji">🎉</div>
      <h3>Done for now</h3><p>${sessionTotal} card${sessionTotal!==1?'s':''} reviewed in this round.</p>
      <button class="btn" onclick="startStudy()">Study again</button></div>`;
    return;
  }
  document.getElementById('studyCount').textContent=`${sessionDone+1} / ${sessionTotal}`;
  document.getElementById('studyBar').style.width=`${(sessionDone/sessionTotal)*100}%`;
  const v=cur, frontCN=dir==='cn2th';
  const exHTML = v.ex_cn?`<div class="divider"></div><div class="ex">
      <div class="ex-cn cn">${v.ex_cn}</div>
      ${v.ex_py?`<div class="ex-py">${v.ex_py}</div>`:''}
      ${v.ex_th?`<div class="ex-th th">${v.ex_th}</div>`:''}</div>`:'';
  area.innerHTML=`
    <div class="stage fade">
      <div class="flash ${flipped?'flip':''}" id="flash">
        <div class="face front">
          <span class="eyebrow">Lesson ${v.lesson} · ${frontCN?'อ่านแล้วแปล':'แปลเป็นจีน'}</span>
          ${frontCN?`<button class="speak" id="spk1">🔊</button><div class="big-cn cn">${v.cn}</div>`
                   :`<div class="big-th th">${v.th}</div>`}
          <div class="hint">Tap to reveal</div>
        </div>
        <div class="face back">
          <span class="eyebrow">Lesson ${v.lesson}</span>
          <button class="speak" id="spk2">🔊</button>
          ${frontCN?`<div class="big-th th">${v.th}</div><div class="py">${v.py}</div>${v.en?`<div class="en">${v.en}</div>`:''}`
                   :`<div class="big-cn cn">${v.cn}</div><div class="py">${v.py}</div>`}
          ${exHTML}
        </div>
      </div>
    </div>
    <div class="grades" id="grades" style="${flipped?'':'visibility:hidden'}">
      <button class="grade g-again" onclick="answer(0)">Again<small>&lt;1m</small></button>
      <button class="grade g-hard"  onclick="answer(1)">Hard<small>${ivl(1)}</small></button>
      <button class="grade g-good"  onclick="answer(2)">Good<small>${ivl(2)}</small></button>
      <button class="grade g-easy"  onclick="answer(3)">Easy<small>${ivl(3)}</small></button>
    </div>`;
  const fl=document.getElementById('flash');
  fl.onclick=()=>{ if(!flipped){flipped=true; fl.classList.add('flip'); document.getElementById('grades').style.visibility='visible';} };
  const s1=document.getElementById('spk1'), s2=document.getElementById('spk2');
  if(s1)s1.onclick=e=>{e.stopPropagation();speak(v.cn);};
  if(s2)s2.onclick=e=>{e.stopPropagation();speak(v.cn);};
}
function ivl(g){ // preview label
  const c=PROG[cur.cn]||{ease:2.5,interval:0,reps:0};
  let i;
  if(g===1)i=Math.max(1,(c.interval||1)*1.2);
  else if(g===2)i=c.reps===0?1:Math.max(1,c.interval*c.ease);
  else i=Math.max(4,(c.interval||1)*c.ease*1.3);
  i=Math.round(i); return i>=1?i+'d':'soon';
}
function answer(g){ grade(cur.cn,g); sessionDone++; nextCard(); }
function startStudy(){ buildQueue(); nextCard(); }

/* ---------- QUIZ ---------- */
let quiz=[], qi=0, qScore=0, answered=false;
function buildQuiz(){
  const d=deck();
  let items=[];
  // built-in fill-in-the-blank for this lesson scope
  const fib=(lesson==='all'?DATA.quizzes:DATA.quizzes.filter(q=>q.lesson===lesson));
  fib.forEach(q=>items.push({type:'fib',q}));
  // multiple-choice from vocab
  const pool=d.slice(); shuffle(pool);
  pool.slice(0,Math.max(0,10-items.length)).forEach(v=>{
    const wrong=shuffle(d.filter(x=>x.cn!==v.cn)).slice(0,3);
    const opts=shuffle([v,...wrong]);
    items.push({type:'mc',v,opts,answer:opts.indexOf(v)});
  });
  shuffle(items);
  quiz=items.slice(0,10); qi=0; qScore=0;
}
function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(quiz.length===0){
    area.innerHTML=`<div class="center-card"><div class="emoji">📝</div><h3>Ready?</h3>
      <p>${(lesson==='all'?'All lessons':'Lesson '+lesson)} · up to 10 questions.</p>
      <button class="btn" onclick="startQuiz()">Start quiz</button></div>`; return;
  }
  if(qi>=quiz.length){
    const pct=Math.round(qScore/quiz.length*100);
    area.innerHTML=`<div class="center-card fade"><div class="emoji">${pct>=80?'🏆':pct>=50?'👍':'📚'}</div>
      <h3>${qScore} / ${quiz.length}</h3><p>${pct}% correct</p>
      <button class="btn" onclick="startQuiz()">Try again</button>
      <button class="btn ghost" style="margin-top:10px" onclick="switchView('study')">Back to study</button></div>`;
    return;
  }
  const it=quiz[qi]; answered=false;
  document.getElementById('quizSub').textContent=`Question ${qi+1} of ${quiz.length} · score ${qScore}`;
  if(it.type==='fib'){
    area.innerHTML=`<div class="q-card fade">
      <div class="q-prompt">เติมคำในช่องว่าง · Fill the blank</div>
      <div class="q-main sentence cn">${it.q.sentence_cn.replace(/＿+/,'<span style="color:var(--coral)">＿＿</span>')}</div>
      ${it.q.sentence_th?`<div class="q-hint th">${it.q.sentence_th}</div>`:''}
    </div>
    <div class="opts" id="opts">${it.q.options.map((o,i)=>`<button class="opt cn" onclick="ansQuiz(${i},${it.q.answer})">${o}</button>`).join('')}</div>`;
  } else {
    const askCN = dir==='cn2th';
    area.innerHTML=`<div class="q-card fade">
      <div class="q-prompt">${askCN?'เลือกความหมาย · Choose meaning':'เลือกคำจีน · Choose the word'}</div>
      <div class="q-main ${askCN?'cn':'th'}">${askCN?it.v.cn:it.v.th}</div>
      <div class="q-hint">${askCN?it.v.py:''}</div>
    </div>
    <div class="opts" id="opts">${it.opts.map((o,i)=>`<button class="opt ${askCN?'th':'cn'}" onclick="ansQuiz(${i},${it.answer})">${askCN?o.th:o.cn}</button>`).join('')}</div>`;
  }
}
function ansQuiz(picked,correct){
  if(answered)return; answered=true;
  const btns=[...document.querySelectorAll('#opts .opt')];
  btns.forEach((b,i)=>{ b.style.pointerEvents='none';
    if(i===correct)b.classList.add('correct');
    else if(i===picked)b.classList.add('wrong'); else b.classList.add('dim'); });
  const ok=picked===correct; if(ok)qScore++;
  META.quizTotal++; if(ok)META.quizCorrect++; saveMeta();
  const it=quiz[qi];
  if(it.type==='mc') speak(it.v.cn);
  setTimeout(()=>{ qi++; renderQuiz(); }, ok?700:1300);
}
function startQuiz(){ buildQuiz(); renderQuiz(); }

/* ---------- BROWSE ---------- */
function renderBrowse(filter=''){
  const list=document.getElementById('browseList');
  document.getElementById('browseSub').textContent=`${DATA.vocab.length} words · 6 lessons`;
  const f=filter.trim().toLowerCase();
  const rows=DATA.vocab.filter(v=>!f||v.cn.includes(f)||v.py.toLowerCase().includes(f)||v.th.toLowerCase().includes(f)||(v.en||'').toLowerCase().includes(f));
  if(rows.length===0){ list.innerHTML=`<div class="center-card"><p>No matches. Try another term.</p></div>`; return; }
  list.innerHTML=rows.map(v=>`<div class="row" onclick="speak('${v.cn}')">
    <div class="rc cn">${v.cn}</div>
    <div class="rt"><div class="rp">${v.py}</div><div class="rm th">${v.th}</div></div>
    <div class="tag">${v.lesson}</div></div>`).join('');
}

/* ---------- STATS ---------- */
function renderStats(){
  const total=DATA.vocab.length;
  const seen=Object.values(PROG).filter(c=>c.reps>0).length;
  const dueNow=DATA.vocab.filter(v=>PROG[v.cn]&&PROG[v.cn].due<=now()&&PROG[v.cn].reps>0).length;
  const mastered=Object.values(PROG).filter(c=>c.interval>=7).length;
  const acc=META.quizTotal?Math.round(META.quizCorrect/META.quizTotal*100):0;
  const g=document.getElementById('statGrid');
  g.innerHTML=`
    <div class="stat"><div class="n jade">${seen}<span style="font-size:18px;color:var(--muted)">/${total}</span></div><div class="l">Words started</div></div>
    <div class="stat"><div class="n grass">${mastered}</div><div class="l">Mastered (7+ day)</div></div>
    <div class="stat"><div class="n coral">${dueNow}</div><div class="l">Due to review</div></div>
    <div class="stat"><div class="n">${acc}%</div><div class="l">Quiz accuracy (${META.quizTotal})</div></div>`;
}

/* ---------- nav / chips / toggles ---------- */
function switchView(v){
  view=v;
  ['study','quiz','browse','stats'].forEach(x=>document.getElementById('view-'+x).classList.toggle('hide',x!==v));
  [...document.querySelectorAll('#nav button')].forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  if(v==='study'){ if(!cur&&queue.length===0) startStudy(); else renderStudy(); }
  if(v==='quiz') renderQuiz();
  if(v==='browse') renderBrowse(document.getElementById('search').value);
  if(v==='stats') renderStats();
}
function renderChips(){
  const c=document.getElementById('lessonChips');
  const all=['all',...DATA.lessons];
  c.innerHTML=all.map(l=>`<button class="chip ${l===lesson?'on':''}" data-l="${l}">${l==='all'?'All':l}</button>`).join('');
  [...c.children].forEach(b=>b.onclick=()=>{ lesson=b.dataset.l; renderChips(); startStudy(); if(view==='quiz')quiz=[]; });
}
function shuffle(a){a=a.slice?a.slice():a;for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)switchView(b.dataset.view);});
document.getElementById('dirToggle').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; dir=b.dataset.dir;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  if(view==='study')renderStudy(); if(view==='quiz')renderQuiz();
});
document.getElementById('search').addEventListener('input',e=>renderBrowse(e.target.value));
document.getElementById('resetBtn').addEventListener('click',async()=>{
  if(confirm('Erase all study progress on this device?')){ PROG={}; META={quizCorrect:0,quizTotal:0}; await saveProg(); await saveMeta(); renderStats(); startStudy(); }
});

/* ---------- boot ---------- */
(async()=>{ await load(); renderChips(); startStudy(); })();
</script>
</body>
